# Build wheel + sdist, quickshell tarball, and versioned install.sh; upload to the GitHub Release.
# Maintainer: bump version in pyproject.toml, commit, then:
#   git tag vX.Y.Z && git push origin vX.Y.Z

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build frontend
        run: pip install --upgrade pip build

      - name: Build wheel and sdist
        run: python -m build

      - name: Package Quickshell assets
        run: tar -czf quickshell-orateur.tar.gz quickshell

      - name: Versioned install.sh for this release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp scripts/install.sh install.sh
          sed -i "s/^DEFAULT_ORATEUR_VERSION=\"\"/DEFAULT_ORATEUR_VERSION=\"${VERSION}\"/" install.sh

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            bin/orateur
            install.sh
            quickshell-orateur.tar.gz
